{% extends 'layout.html' %}
{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Create Account</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary);">Login</a>
    </p>
</div>
{% endblock %}
